<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Mastery</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
    <style>
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .breadcrumb-item {
            color: var(--gray-500);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .breadcrumb-item:hover {
            color: var(--primary-blue);
        }
        .breadcrumb-item.active {
            color: var(--gray-900);
            font-weight: 500;
        }
        .breadcrumb-separator {
            color: var(--gray-400);
        }
        .big-idea-header {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .big-idea-header h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
        }
        .big-idea-header p {
            color: var(--gray-600);
            margin: 0;
        }
        .big-idea-progress {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-200);
        }
        .big-idea-progress .progress-bar {
            flex: 1;
            height: 10px;
        }
        .progress-text {
            font-weight: 600;
            color: var(--primary-blue);
            min-width: 60px;
        }
        .topics-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .topic-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .topic-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .topic-card.locked {
            opacity: 0.7;
        }
        .topic-number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--gray-600);
            flex-shrink: 0;
        }
        .topic-card.passed .topic-number {
            background: var(--success-green);
            color: white;
        }
        .topic-card.available .topic-number {
            background: var(--primary-blue);
            color: white;
        }
        .topic-info {
            flex: 1;
        }
        .topic-info h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1.125rem;
        }
        .topic-info p {
            margin: 0;
            color: var(--gray-600);
            font-size: 0.875rem;
        }
        .topic-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--gray-500);
        }
        .topic-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .topic-score {
            text-align: center;
        }
        .topic-score .score-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        .topic-score .score-label {
            font-size: 0.75rem;
            color: var(--gray-500);
        }
        .btn-start {
            padding: 0.75rem 1.5rem;
            white-space: nowrap;
        }
        .btn-start:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-badge.passed {
            background: rgb(22 163 74 / 0.1);
            color: var(--success-green);
        }
        .status-badge.available {
            background: rgb(26 86 219 / 0.1);
            color: var(--primary-blue);
        }
        .status-badge.locked {
            background: var(--gray-100);
            color: var(--gray-500);
        }
        .status-badge.wait {
            background: rgb(234 179 8 / 0.1);
            color: #b45309;
        }
        .wait-time {
            font-size: 0.75rem;
            color: #b45309;
            margin-top: 0.25rem;
        }
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-500);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .btn-secondary {
            padding: 0.5rem 1rem;
            background: var(--gray-200);
            color: var(--gray-700);
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: var(--gray-300);
        }
        .topic-resources {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--gray-200);
        }
        .resources-toggle {
            background: none;
            border: none;
            color: var(--primary-blue);
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
        }
        .resources-toggle:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }
        .resources-toggle svg {
            transition: transform 0.2s;
        }
        .resources-toggle.expanded svg {
            transform: rotate(180deg);
        }
        .resources-content {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(26, 86, 219, 0.05);
            border-radius: var(--border-radius);
        }
        .resources-content.expanded {
            display: block;
        }
        .resources-loading {
            text-align: center;
            color: var(--gray-500);
            font-size: 0.875rem;
            padding: 1rem;
        }
        .resource-category {
            margin-bottom: 1rem;
        }
        .resource-category h5 {
            margin: 0 0 0.5rem 0;
            font-size: 0.875rem;
            color: var(--gray-700);
        }
        .resource-list-compact {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .resource-item-compact {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--white);
            border-radius: var(--border-radius);
            border: 1px solid var(--gray-200);
        }
        .resource-item-compact:hover {
            border-color: var(--primary-blue);
        }
        .resource-type-compact {
            background: var(--gray-100);
            color: var(--gray-600);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.625rem;
            text-transform: uppercase;
            font-weight: 500;
            flex-shrink: 0;
        }
        .resource-type-compact.article {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success-green);
        }
        .resource-type-compact.video {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
        }
        .resource-type-compact.exercise {
            background: rgba(168, 85, 247, 0.1);
            color: #8b5cf6;
        }
        .resource-details {
            flex: 1;
        }
        .resource-title-compact {
            margin: 0 0 0.25rem 0;
            font-size: 0.875rem;
        }
        .resource-title-compact a {
            color: var(--primary-blue);
            text-decoration: none;
        }
        .resource-title-compact a:hover {
            text-decoration: underline;
        }
        .resource-description-compact {
            font-size: 0.75rem;
            color: var(--gray-600);
            margin: 0;
        }

        .pseudocode-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            color: var(--text);
        }

        .math-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            overflow-x: auto;
            color: var(--text);
            font-size: 1.15rem;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div class="logo">
                    <h1>AP Mastery</h1>
                    <span>Student Dashboard</span>
                </div>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <button id="logout-btn" class="btn-secondary">Logout</button>
                </div>
            </div>
        </header>

        <main class="main">
            <nav class="breadcrumb">
                <a href="/student/dashboard.html" class="breadcrumb-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Big Ideas
                </a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active" id="breadcrumb-current">Loading...</span>
            </nav>

            <div id="content">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 AP Mastery. Built for AP Computer Science Principles educators.</p>
        </footer>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Firebase Client SDK for persistent auth -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/auth-helper.js"></script>

    <script>
        const apiBase = window.location.origin + '/api';
        let token = localStorage.getItem('authToken');
        let userData = JSON.parse(localStorage.getItem('userData') || '{}');

        // Get bigIdeaId and classId from URL
        const urlParams = new URLSearchParams(window.location.search);
        const bigIdeaId = urlParams.get('id');
        const classId = urlParams.get('classId');

        if (!bigIdeaId) {
            window.location.href = '/student/dashboard.html';
        }

        // Check auth and get fresh token
        AuthHelper.checkAuth({ allowedRoles: ['student'] }).then(({ token: freshToken, userData: freshUserData }) => {
            token = freshToken;
            if (freshUserData) userData = freshUserData;
            document.getElementById('user-name').textContent = userData.displayName || userData.username || 'Student';
            loadBigIdea();
        }).catch(() => {
            // AuthHelper will redirect to login
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            AuthHelper.signOut();
        });

        // State
        let matrixData = null;
        let classSettings = { progressionMode: 'linear' };

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatQuestionText(text) {
            if (!text) return '';
            
            // 1. Escape HTML first
            let formatted = escapeHtml(text);
            
            // 2. Handle LaTeX block math: $$ formula $$
            const blockMathRegex = /\$\$([\s\S]*?)\$\$/g;
            text.replace(blockMathRegex, (match, formula) => {
                try {
                    const html = typeof katex !== 'undefined' 
                        ? `<div class="math-block">${katex.renderToString(formula.trim(), { displayMode: true, throwOnError: false })}</div>`
                        : `<div class="math-block">${match}</div>`;
                    const placeholder = escapeHtml(match);
                    formatted = formatted.split(placeholder).join(html);
                } catch (e) { console.error(e); }
            });
            
            // 3. Handle LaTeX inline math: $ formula $
            const inlineMathRegex = /\$([^$]+?)\$/g;
            text.replace(inlineMathRegex, (match, formula) => {
                try {
                    const html = typeof katex !== 'undefined'
                        ? katex.renderToString(formula.trim(), { displayMode: false, throwOnError: false })
                        : match;
                    const placeholder = escapeHtml(match);
                    formatted = formatted.split(placeholder).join(html);
                } catch (e) { console.error(e); }
            });

            // 4. Handle code blocks: ``` code ```
            const codeBlockRegex = /(?:```|''')(?:[a-z]*\n)?([\s\S]*?)(?:```|''')/g;
            text.replace(codeBlockRegex, (match, code) => {
                const html = `<div class="pseudocode-block">${escapeHtml(code.trim())}</div>`;
                const placeholder = escapeHtml(match);
                formatted = formatted.split(placeholder).join(html);
            });
            
            return formatted;
        }

        async function loadBigIdea() {
            try {
                const url = classId
                    ? `${apiBase}/topics/big-ideas/${bigIdeaId}?classId=${classId}`
                    : `${apiBase}/topics/big-ideas/${bigIdeaId}`;

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load');
                }

                const data = await response.json();
                if (data.classSettings) {
                    classSettings = data.classSettings;
                }
                renderBigIdea(data);

            } catch (error) {
                console.error('Error loading big idea:', error);
                document.getElementById('content').innerHTML = `
                    <div class="loading-state">
                        <h3>Error loading content</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        function renderBigIdea(data) {
            const { bigIdea, topics } = data;

            // Calculate overall progress
            const passedCount = topics.filter(t => t.status === 'passed').length;
            const progressPercent = topics.length > 0 ? Math.round((passedCount / topics.length) * 100) : 0;

            document.title = `${bigIdea.shortName || bigIdea.name} - AP Mastery`;

            // Update breadcrumb
            document.getElementById('breadcrumb-current').textContent = bigIdea.shortName || bigIdea.name;

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="big-idea-header" style="border-left: 4px solid ${bigIdea.color || '#3B82F6'}">
                    <h2>${bigIdea.name}</h2>
                    <p>${formatQuestionText(bigIdea.description)}</p>
                    <div class="big-idea-progress">
                        <span style="color: var(--gray-600);">Progress:</span>
                        <div class="progress-bar">
                            <div class="progress-fill ${progressPercent === 100 ? 'success' : ''}" style="width: ${progressPercent}%"></div>
                        </div>
                        <span class="progress-text">${passedCount}/${topics.length}</span>
                    </div>
                </div>

                <h2 style="margin-bottom: 1.5rem;">Topics</h2>

                <div class="topics-list">
                    ${topics.map((topic, index) => renderTopicCard(topic, index)).join('')}
                </div>
            `;
        }

        function renderTopicCard(topic, index) {
            const statusClass = topic.status;
            const isLocked = topic.status === 'locked';
            const isPassed = topic.status === 'passed';
            const hasWaitTime = topic.waitUntil && topic.remainingMinutes > 0;
            const isManual = classSettings.progressionMode === 'manual';
            const hasAttempts = topic.attemptCount > 0;
            
            // In manual mode, subsequent attempts (retakes) must be explicitly unlocked
            // This applies whether they passed or failed previously
            const retakeDisabled = isManual && hasAttempts && !topic.retakeUnlocked;

            // Format remaining wait time
            let waitTimeText = '';
            if (hasWaitTime) {
                const mins = topic.remainingMinutes;
                if (mins >= 60) {
                    const hours = Math.floor(mins / 60);
                    const remainingMins = mins % 60;
                    waitTimeText = remainingMins > 0
                        ? `${hours}h ${remainingMins}m remaining`
                        : `${hours}h remaining`;
                } else {
                    waitTimeText = `${mins}m remaining`;
                }
            }

            return `
                <div class="topic-card ${statusClass} ${retakeDisabled ? 'locked' : ''}">
                    <div class="topic-number">${isPassed ? '&#10003;' : index + 1}</div>
                    <div class="topic-info" style="flex: 1;">
                        <h3>${topic.name}</h3>
                        ${topic.description ? `<p>${formatQuestionText(topic.description)}</p>` : ''}
                        ${topic.attemptCount > 0 ? `
                        <div class="topic-meta">
                            <span>${topic.attemptCount} attempt${topic.attemptCount > 1 ? 's' : ''}</span>
                            ${isManual && topic.retakeUnlocked ? '<span style="color: var(--success-green); font-weight: 600; margin-left: 8px;">Retake Authorized</span>' : ''}
                        </div>
                        ` : ''}
                        <div class="topic-resources">
                            <button class="resources-toggle" onclick="toggleResources('${topic.id}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                                Study Resources
                            </button>
                            <div class="resources-content" id="resources-${topic.id}">
                                <div class="resources-loading">Loading resources...</div>
                            </div>
                        </div>
                    </div>
                    <div class="topic-actions">
                        ${topic.bestScore !== null ? `
                            <div class="topic-score">
                                <div class="score-value">${topic.bestScore}/5</div>
                                <div class="score-label">Best Score</div>
                            </div>
                        ` : ''}
                        <div style="text-align: center;">
                            <span class="status-badge ${hasWaitTime ? 'wait' : (retakeDisabled ? 'locked' : statusClass)}">
                                ${hasWaitTime ? 'Wait' : (retakeDisabled ? 'Locked' : (isPassed ? 'Passed' : (isLocked ? 'Locked' : 'Available')))}
                            </span>
                            ${hasWaitTime ? `<div class="wait-time">${waitTimeText}</div>` : ''}
                        </div>
                        <button class="btn-primary btn-start"
                                ${isLocked || hasWaitTime || retakeDisabled ? 'disabled' : ''}
                                onclick="startQuiz('${topic.id}')">
                            ${hasWaitTime ? 'Wait' : (retakeDisabled ? 'Locked' : (isPassed ? 'Retake' : (isLocked ? 'Locked' : 'Start Quiz')))}
                        </button>
                    </div>
                </div>
            `;
        }

        function startQuiz(topicId) {
            if (!classId) {
                showToast('Please select a class first', 'warning');
                return;
            }
            window.location.href = `/student/quiz.html?topicId=${topicId}&classId=${classId}&bigIdeaId=${bigIdeaId}`;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function toggleResources(topicId) {
            const toggle = document.querySelector(`button[onclick="toggleResources('${topicId}')"]`);
            const content = document.getElementById(`resources-${topicId}`);
            
            if (content.classList.contains('expanded')) {
                // Collapse
                content.classList.remove('expanded');
                toggle.classList.remove('expanded');
            } else {
                // Expand and load resources if not already loaded
                content.classList.add('expanded');
                toggle.classList.add('expanded');
                
                // Check if already loaded
                if (!content.dataset.loaded) {
                    await loadTopicResources(topicId);
                }
            }
        }

        async function loadTopicResources(topicId) {
            const content = document.getElementById(`resources-${topicId}`);
            
            try {
                const response = await fetch(`${apiBase}/topics/${topicId}/resources`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load resources');
                }

                const data = await response.json();
                content.innerHTML = renderTopicResources(data.resources);
                content.dataset.loaded = 'true';

            } catch (error) {
                console.error('Error loading resources:', error);
                content.innerHTML = `
                    <div style="text-align: center; color: var(--danger-red); padding: 1rem;">
                        Failed to load resources. Please try again.
                    </div>
                `;
            }
        }

        function renderTopicResources(resources) {
            if (!resources || (!resources.khanAcademy?.length && !resources.additional?.length && !resources.customTeacherResources?.length)) {
                return `
                    <div style="text-align: center; color: var(--gray-500); padding: 1rem;">
                        No study resources available for this topic yet.
                    </div>
                `;
            }

            let html = '';

            // Khan Academy Resources
            if (resources.khanAcademy && resources.khanAcademy.length > 0) {
                html += `
                    <div class="resource-category">
                        <h5>📚 Khan Academy Resources</h5>
                        <div class="resource-list-compact">
                            ${resources.khanAcademy.map(resource => `
                                <div class="resource-item-compact">
                                    <span class="resource-type-compact ${resource.type}">${resource.type}</span>
                                    <div class="resource-details">
                                        <h6 class="resource-title-compact">
                                            <a href="${resource.url}" target="_blank" rel="noopener noreferrer">
                                                ${formatQuestionText(resource.title)}
                                            </a>
                                        </h6>
                                        <p class="resource-description-compact">${formatQuestionText(resource.description)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Additional Resources
            if (resources.additional && resources.additional.length > 0) {
                html += `
                    <div class="resource-category">
                        <h5>🌐 Additional Resources</h5>
                        <div class="resource-list-compact">
                            ${resources.additional.map(resource => `
                                <div class="resource-item-compact">
                                    <span class="resource-type-compact ${resource.type}">${resource.type}</span>
                                    <div class="resource-details">
                                        <h6 class="resource-title-compact">
                                            <a href="${resource.url}" target="_blank" rel="noopener noreferrer">
                                                ${formatQuestionText(resource.title)}
                                            </a>
                                        </h6>
                                        <p class="resource-description-compact">${formatQuestionText(resource.description)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Custom Teacher Resources
            if (resources.customTeacherResources && resources.customTeacherResources.length > 0) {
                html += `
                    <div class="resource-category">
                        <h5>👩‍🏫 Teacher Recommended</h5>
                        <div class="resource-list-compact">
                            ${resources.customTeacherResources.map(resource => `
                                <div class="resource-item-compact">
                                    <span class="resource-type-compact ${resource.type}">${resource.type}</span>
                                    <div class="resource-details">
                                        <h6 class="resource-title-compact">
                                            <a href="${resource.url}" target="_blank" rel="noopener noreferrer">
                                                ${formatQuestionText(resource.title)}
                                            </a>
                                        </h6>
                                        <p class="resource-description-compact">${formatQuestionText(resource.description)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            return html;
        }

        // Note: Initial load is handled by AuthHelper.checkAuth callback above
    </script>
</body>
</html>
