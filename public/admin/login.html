<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Mastery</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }
        .login-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            margin: 1rem;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            color: var(--accent);
            font-size: 3rem;
            margin-bottom: 0.25rem;
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            font-weight: 800;
            line-height: 1;
        }
        .login-header p {
            color: var(--muted);
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            font-size: 0.9rem;
        }
        .admin-badge {
            display: inline-block;
            background: var(--surface2);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.75rem;
            border: 1px solid var(--border2);
        }
        .error-message {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            padding: 0.75rem;
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }
        .error-message.show {
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--muted);
            text-decoration: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>AP Mastery</h1>
            <p>Question Management Portal</p>
            <span class="admin-badge">Admin Access</span>
        </div>

        <div id="error-message" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="admin@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="btn-primary btn-login">Login</button>
        </form>

        <a href="/" class="back-link">Back to main site</a>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>Logging in...</p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/auth-helper.js"></script>

    <script>
        const apiBase = window.location.origin + '/api';
        const auth = firebase.auth();

        // Check if already logged in as admin
        AuthHelper.checkAuth({ requireAuth: false, allowedRoles: ['admin'] }).then(() => {
            window.location.href = '/admin/dashboard.html';
        }).catch(() => {
            // Not logged in as admin, show login form
        });

        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error-message').classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loading-overlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.remove('active');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            showLoading();

            try {
                // Sign in with Firebase
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const idToken = await userCredential.user.getIdToken();

                // Verify with backend
                const response = await fetch(`${apiBase}/auth/verify-login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({ isAdmin: true })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store auth data
                    localStorage.setItem('authToken', idToken);
                    localStorage.setItem('userData', JSON.stringify(data.user));

                    // Redirect to admin dashboard
                    window.location.href = '/admin/dashboard.html';
                } else {
                    await auth.signOut();
                    showError(data.error || 'Access denied. Admin privileges required.');
                }

            } catch (error) {
                console.error('Login error:', error);
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    showError('Invalid email or password');
                } else {
                    showError('Login failed. Please try again.');
                }
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
