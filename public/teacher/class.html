<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Mastery · AP CSP Mastery</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Navbar styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            width: 100%;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-link {
            padding: 0.6rem 1.25rem;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border2);
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover {
            background: var(--border);
            color: var(--text);
            border-color: var(--accent);
        }

        .nav-link.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #user-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .btn-logout {
            padding: 0.5rem 1rem;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
            border-radius: 6px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 107, 107, 0.05);
        }

        /* Breadcrumb styles */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        .breadcrumb a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb a:hover {
            color: var(--accent);
        }

        .breadcrumb-separator {
            color: var(--border2);
        }

        .breadcrumb-current {
            color: var(--text);
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .class-info h2 {
            margin: 0 0 0.75rem 0;
            font-size: 2.5rem;
            line-height: 1;
        }
        .class-code {
            display: inline-block;
            background: var(--bg);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            border: 1px solid var(--border2);
        }
        .view-toggle {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .view-btn {
            padding: 0.6rem 1.25rem;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .view-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .view-btn.active {
            border-color: var(--accent);
            background: var(--dim);
            color: var(--accent);
        }
        .matrix-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .matrix-scroll {
            overflow-x: auto;
        }
        .progress-matrix {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .progress-matrix th,
        .progress-matrix td {
            padding: 1.25rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .progress-matrix th {
            background: var(--surface2);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .progress-matrix th.topic-header {
            max-width: 120px;
            white-space: normal;
            vertical-align: bottom;
            line-height: 1.2;
        }
        .progress-matrix th.clickable {
            cursor: pointer;
            transition: all 0.2s;
        }
        .progress-matrix th.clickable:hover {
            background: var(--border);
            color: var(--accent);
        }
        .progress-matrix td:first-child,
        .progress-matrix th:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            background: var(--surface);
            z-index: 10;
            min-width: 180px;
            border-right: 1px solid var(--border2);
        }
        .progress-matrix th:first-child {
            background: var(--surface2);
            z-index: 11;
        }
        .progress-matrix tbody tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        .progress-matrix tbody tr:hover td:first-child {
            background: var(--surface2);
        }
        .student-name {
            font-weight: 700;
            color: var(--text);
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-cell {
            min-width: 60px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 800;
            min-width: 40px;
        }
        .status-badge.passed {
            background: rgba(78, 201, 123, 0.1);
            color: var(--success);
            border: 1px solid rgba(78, 201, 123, 0.2);
        }
        .status-badge.available {
            background: var(--dim);
            color: var(--accent);
            border: 1px solid var(--border2);
        }
        .status-badge.locked {
            background: var(--bg);
            color: var(--dim);
            border: 1px solid var(--border);
        }
        .score-with-attempts {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }
        .btn-reset-password {
            background: none;
            border: none;
            color: var(--dim);
            cursor: pointer;
            padding: 4px;
            margin-left: 8px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0.4;
        }
        .btn-reset-password:hover {
            color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            opacity: 1;
        }
        .student-name {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 180px;
        }
        .attempt-count {
            font-size: 0.6rem;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .progress-cell {
            font-weight: 800;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
        }
        .progress-cell.high {
            color: var(--success);
        }
        .progress-cell.medium {
            color: var(--warning);
        }
        .progress-cell.low {
            color: var(--muted);
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        .empty-state h3 {
            margin-bottom: 1rem;
            color: var(--border2);
            font-size: 1.5rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .unit-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 0.5rem;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            background: var(--surface2);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border2);
        }
        .section-title h3 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text);
            line-height: 1;
        }
        .back-to-units {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border2);
            transition: all 0.2s;
        }
        .back-to-units:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        .status-badge.clickable {
            cursor: pointer;
            transition: all 0.2s;
        }
        .status-badge.clickable:hover {
            transform: scale(1.1);
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--surface);
            border: 2px solid var(--border2);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border2);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: var(--surface2);
        }
        .modal-header h3 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            color: var(--text);
            line-height: 1;
        }
        .modal-header p {
            margin: 0;
            color: var(--accent);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
        }
        .modal-close {
            background: var(--bg);
            border: 1px solid var(--border2);
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--muted);
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover {
            color: var(--danger);
            border-color: var(--danger);
        }
        .modal-body {
            padding: 2rem;
            overflow-y: auto;
            flex: 1;
        }
        .attempt-selector {
            margin-bottom: 2rem;
            background: var(--surface2);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border2);
        }
        .attempt-selector label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }
        .attempt-selector select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-size: 0.9rem;
        }
        .attempt-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .attempt-stat {
            background: var(--surface2);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border2);
        }
        .attempt-stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            font-family: 'Barlow Condensed', sans-serif;
            line-height: 1;
        }
        .attempt-stat-value.passed {
            color: var(--success);
        }
        .attempt-stat-value.failed {
            color: var(--danger);
        }
        .attempt-stat-label {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        .question-review {
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            background: var(--surface2);
        }
        .question-review-header {
            padding: 1rem 1.5rem;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .question-review-header.correct {
            border-left: 4px solid var(--success);
        }
        .question-review-header.incorrect {
            border-left: 4px solid var(--danger);
        }
        .question-review-body {
            padding: 1.5rem;
        }
        .question-text-review {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1.25rem;
            line-height: 1.5;
        }
        .answer-row {
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .answer-row.student-answer {
            background: var(--dim);
            color: var(--accent);
            border-color: var(--border2);
        }
        .answer-row.correct-answer {
            background: rgba(78, 201, 123, 0.05);
            color: var(--success);
            border-color: rgba(78, 201, 123, 0.2);
            font-weight: 600;
        }
        .answer-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-right: 0.75rem;
            font-size: 0.75rem;
        }
        .time-spent {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .explanation-box {
            margin-top: 1.25rem;
            padding: 1rem 1.25rem;
            background: var(--bg);
            border-radius: 8px;
            font-size: 0.9rem;
            border-left: 2px solid var(--accent);
            color: var(--text);
            line-height: 1.5;
        }
        .explanation-box strong {
            color: var(--accent);
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .no-attempts {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }
        .pseudocode-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="navbar">
                <div class="logo">
                    <h1>AP Mastery</h1>
                    <span>Teacher Portal</span>
                </div>
                <div class="nav-links">
                    <a href="/teacher/dashboard.html" class="nav-link active">Dashboard</a>
                    <a href="/teacher/item-analysis.html" class="nav-link">Item Analysis</a>
                    <a href="/teacher/question-management.html" class="nav-link">Questions</a>
                </div>
                <div class="user-section">
                    <span id="user-name">Loading...</span>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="class-header">
                <div class="class-info">
                    <h2 id="class-name">Loading...</h2>
                    <div class="class-code" id="class-code">---</div>
                </div>
            </div>

            <div id="section-header" class="section-title" style="display: none;">
                <span id="back-to-units" class="back-to-units">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Units
                </span>
                <h3 id="selected-unit-name"></h3>
            </div>

            <div class="matrix-container">
                <div class="matrix-scroll">
                    <table class="progress-matrix" id="matrix-table">
                        <thead>
                            <tr id="header-row">
                                <th>Student</th>
                            </tr>
                        </thead>
                        <tbody id="matrix-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 AP Mastery. Built for AP Computer Science Principles educators.</p>
        </footer>
    </div>

    <!-- Attempt Details Modal -->
    <div id="attempt-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <h3 id="modal-title">Quiz Attempt Details</h3>
                    <p id="modal-subtitle">Loading...</p>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="no-attempts">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Firebase Client SDK for persistent auth -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/auth-helper.js"></script>

    <script>
        const apiBase = window.location.origin + '/api';
        let token = localStorage.getItem('authToken');
        let userData = JSON.parse(localStorage.getItem('userData') || '{}');

        // Get class ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('id');

        if (!classId) {
            window.location.href = '/teacher/dashboard.html';
        }

        // State
        let matrixData = null;
        let currentView = 'units'; // 'units' or 'topics'
        let selectedBigIdeaId = null;

        // Check auth and get fresh token
        AuthHelper.checkAuth({ allowedRoles: ['teacher'] }).then(({ token: freshToken, userData: freshUserData }) => {
            token = freshToken;
            if (freshUserData) userData = freshUserData;
            document.getElementById('user-name').textContent = userData.displayName || userData.email || 'Teacher';
            loadMatrix();
        }).catch(() => {
            // AuthHelper will redirect to login
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            AuthHelper.signOut();
        });

        // Back to units handler
        document.getElementById('back-to-units').addEventListener('click', () => {
            showUnitsView();
        });

        async function loadMatrix(bigIdeaId = null) {
            try {
                let url = `${apiBase}/classes/${classId}/matrix`;
                if (bigIdeaId) {
                    url += `?bigIdeaId=${bigIdeaId}`;
                }

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load class data');
                }

                matrixData = await response.json();

                // Update class info
                document.getElementById('class-name').textContent = matrixData.classInfo.name;
                document.getElementById('class-code').textContent = matrixData.classInfo.code;
                document.title = `${matrixData.classInfo.name} - AP Mastery`;

                if (bigIdeaId) {
                    showTopicsView(bigIdeaId);
                } else {
                    showUnitsView();
                }

            } catch (error) {
                console.error('Failed to load matrix:', error);
                document.getElementById('matrix-body').innerHTML = `
                    <tr>
                        <td colspan="100" class="empty-state">
                            <h3>Error Loading Data</h3>
                            <p>Please try refreshing the page.</p>
                        </td>
                    </tr>
                `;
            }
        }

        function showUnitsView() {
            currentView = 'units';
            selectedBigIdeaId = null;
            document.getElementById('section-header').style.display = 'none';

            const { classInfo, bigIdeas, students } = matrixData;

            // Build header row with Big Ideas
            const headerRow = document.getElementById('header-row');
            headerRow.innerHTML = '<th>Student</th>';

            bigIdeas.forEach(bigIdea => {
                const th = document.createElement('th');
                th.className = 'topic-header clickable';
                th.innerHTML = `
                    <span class="unit-indicator" style="background-color: ${bigIdea.color || '#3B82F6'}"></span>
                    ${bigIdea.shortName || bigIdea.name}
                `;
                th.title = `Click to view ${bigIdea.name} topics`;
                th.onclick = () => selectBigIdea(bigIdea.id);
                headerRow.appendChild(th);
            });

            const progressTh = document.createElement('th');
            progressTh.textContent = 'Overall';
            headerRow.appendChild(progressTh);

            // Build body
            const tbody = document.getElementById('matrix-body');

            if (students.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="${bigIdeas.length + 2}" class="empty-state">
                            <h3>No Students Yet</h3>
                            <p>Students can join using the class code: ${classInfo.code}</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = students.map(student => {
                let cells = `
                    <td class="student-name">
                        <span>${student.displayName || student.username}</span>
                        <button class="btn-reset-password" onclick="event.stopPropagation(); resetStudentPassword('${student.id}', '${student.displayName || student.username}')" title="Reset Password">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z"/></svg>
                        </button>
                    </td>`;

                bigIdeas.forEach(bigIdea => {
                    const pct = student.bigIdeaProgress[bigIdea.id] || 0;
                    const colorClass = pct >= 80 ? 'high' : (pct >= 40 ? 'medium' : 'low');
                    cells += `<td class="progress-cell ${colorClass}">${pct}%</td>`;
                });

                const overallClass = student.completionPercentage >= 80 ? 'high' : (student.completionPercentage >= 40 ? 'medium' : 'low');
                cells += `<td class="progress-cell ${overallClass}">${student.completionPercentage}%</td>`;

                return `<tr>${cells}</tr>`;
            }).join('');
        }

        function selectBigIdea(bigIdeaId) {
            selectedBigIdeaId = bigIdeaId;
            loadMatrix(bigIdeaId);
        }

        function showTopicsView(bigIdeaId) {
            currentView = 'topics';
            selectedBigIdeaId = bigIdeaId;

            const bigIdea = matrixData.bigIdeas.find(bi => bi.id === bigIdeaId);
            document.getElementById('section-header').style.display = 'flex';
            document.getElementById('selected-unit-name').innerHTML = `
                <span class="unit-indicator" style="background-color: ${bigIdea.color || '#3B82F6'}"></span>
                ${bigIdea.name}
            `;

            const { classInfo, topics, students } = matrixData;

            // Build header row with topics
            const headerRow = document.getElementById('header-row');
            headerRow.innerHTML = '<th>Student</th>';

            topics.forEach(topic => {
                const th = document.createElement('th');
                th.className = 'topic-header';
                th.textContent = topic.name;
                th.title = topic.name;
                headerRow.appendChild(th);
            });

            const progressTh = document.createElement('th');
            progressTh.textContent = 'Progress';
            headerRow.appendChild(progressTh);

            // Build body
            const tbody = document.getElementById('matrix-body');

            if (students.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="${topics.length + 2}" class="empty-state">
                            <h3>No Students Yet</h3>
                            <p>Students can join using the class code: ${classInfo.code}</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = students.map(student => {
                let cells = `
                    <td class="student-name">
                        <span>${student.displayName || student.username}</span>
                        <button class="btn-reset-password" onclick="event.stopPropagation(); resetStudentPassword('${student.id}', '${student.displayName || student.username}')" title="Reset Password">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z"/></svg>
                        </button>
                    </td>`;
                let passedInUnit = 0;

                topics.forEach(topic => {
                    const progress = student.progress[topic.id];
                    let badgeClass = 'locked';
                    let badgeText = '-';
                    let isClickable = false;
                    let attemptCount = 0;

                    if (progress) {
                        badgeClass = progress.status;
                        attemptCount = progress.attemptCount || 0;
                        if (progress.status === 'passed') {
                            passedInUnit++;
                            isClickable = true;
                            if (progress.bestScore !== null) {
                                badgeText = `${progress.bestScore}/5`;
                            } else {
                                badgeText = '✓';
                            }
                        } else if (progress.status === 'available') {
                            isClickable = attemptCount > 0;
                            badgeText = '...';
                        }
                    }

                    const clickAttr = isClickable
                        ? `clickable" onclick="openAttemptModal('${student.id}', '${topic.id}', '${student.displayName || student.username}', '${topic.name}')`
                        : '';

                    const attemptLabel = attemptCount > 0 ? `<span class="attempt-count">${attemptCount} attempt${attemptCount > 1 ? 's' : ''}</span>` : '';

                    cells += `
                        <td class="status-cell">
                            <div class="score-with-attempts">
                                <span class="status-badge ${badgeClass} ${clickAttr}">${badgeText}</span>
                                ${attemptLabel}
                            </div>
                        </td>
                    `;
                });

                const unitPct = topics.length > 0 ? Math.round((passedInUnit / topics.length) * 100) : 0;
                const colorClass = unitPct >= 80 ? 'high' : (unitPct >= 40 ? 'medium' : 'low');
                cells += `<td class="progress-cell ${colorClass}">${unitPct}%</td>`;

                return `<tr>${cells}</tr>`;
            }).join('');
        }

        // Modal functions
        let currentAttemptData = null;

        function openAttemptModal(studentId, topicId, studentName, topicName) {
            document.getElementById('modal-title').textContent = `${studentName}`;
            document.getElementById('modal-subtitle').textContent = topicName;
            document.getElementById('modal-body').innerHTML = '<div class="no-attempts">Loading...</div>';
            document.getElementById('attempt-modal').classList.add('active');

            fetchAttemptDetails(studentId, topicId);
        }

        function closeModal() {
            document.getElementById('attempt-modal').classList.remove('active');
            currentAttemptData = null;
        }

        // Close modal on overlay click
        document.getElementById('attempt-modal').addEventListener('click', (e) => {
            if (e.target.id === 'attempt-modal') {
                closeModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        async function fetchAttemptDetails(studentId, topicId) {
            try {
                const response = await fetch(
                    `${apiBase}/classes/${classId}/students/${studentId}/topics/${topicId}/attempts`,
                    {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }
                );

                if (!response.ok) {
                    throw new Error('Failed to load attempt details');
                }

                currentAttemptData = await response.json();
                renderAttemptDetails(0); // Show most recent attempt by default

            } catch (error) {
                console.error('Error fetching attempts:', error);
                document.getElementById('modal-body').innerHTML = `
                    <div class="no-attempts">
                        <p>Error loading attempt details</p>
                    </div>
                `;
            }
        }

        function renderAttemptDetails(attemptIndex) {
            const { student, topic, attempts } = currentAttemptData;
            const modalBody = document.getElementById('modal-body');

            if (!attempts || attempts.length === 0) {
                modalBody.innerHTML = '<div class="no-attempts">No attempts recorded yet.</div>';
                return;
            }

            const attempt = attempts[attemptIndex];
            const attemptDate = new Date(attempt.timestamp).toLocaleString();
            const totalTimeFormatted = formatTime(attempt.totalTimeMs || 0);

            let html = '';

            // Attempt selector if multiple attempts
            if (attempts.length > 1) {
                html += `
                    <div class="attempt-selector">
                        <label>Select Attempt:</label>
                        <select onchange="renderAttemptDetails(parseInt(this.value))">
                            ${attempts.map((a, i) => `
                                <option value="${i}" ${i === attemptIndex ? 'selected' : ''}>
                                    Attempt ${attempts.length - i} - ${new Date(a.timestamp).toLocaleDateString()} - Score: ${a.score}/5 ${a.passed ? '(Passed)' : ''}
                                </option>
                            `).join('')}
                        </select>
                    </div>
                `;
            }

            // Attempt summary
            html += `
                <div class="attempt-summary">
                    <div class="attempt-stat">
                        <div class="attempt-stat-value ${attempt.passed ? 'passed' : 'failed'}">${attempt.score}/5</div>
                        <div class="attempt-stat-label">Score</div>
                    </div>
                    <div class="attempt-stat">
                        <div class="attempt-stat-value">${attempt.passed ? 'Yes' : 'No'}</div>
                        <div class="attempt-stat-label">Passed</div>
                    </div>
                    <div class="attempt-stat">
                        <div class="attempt-stat-value">${totalTimeFormatted}</div>
                        <div class="attempt-stat-label">Total Time</div>
                    </div>
                    <div class="attempt-stat">
                        <div class="attempt-stat-value" style="font-size: 1rem;">${attemptDate}</div>
                        <div class="attempt-stat-label">Date</div>
                    </div>
                </div>
            `;

            // Questions review
            if (attempt.answers && attempt.answers.length > 0) {
                html += '<h4 style="margin-bottom: 1rem;">Questions</h4>';

                attempt.answers.forEach((answer, i) => {
                    const timeFormatted = formatTime(answer.timeSpentMs || 0);

                    html += `
                        <div class="question-review">
                            <div class="question-review-header ${answer.correct ? 'correct' : 'incorrect'}">
                                <span>Question ${i + 1}</span>
                                <span class="time-spent">Time: ${timeFormatted}</span>
                            </div>
                            <div class="question-review-body">
                                <div class="question-text-review">${formatQuestionText(answer.questionText) || 'Question text not available'}</div>

                                <div class="answer-row student-answer">
                                    <span class="answer-label">Student's Answer:</span>
                                    ${answer.selectedAnswerTexts ? answer.selectedAnswerTexts.join(', ') : answer.selectedAnswerIds.join(', ')}
                                </div>

                                ${!answer.correct ? `
                                    <div class="answer-row correct-answer">
                                        <span class="answer-label">Correct Answer:</span>
                                        ${answer.correctAnswerTexts ? answer.correctAnswerTexts.join(', ') : answer.correctAnswerIds.join(', ')}
                                    </div>
                                ` : ''}

                                ${answer.explanation ? `
                                    <div class="explanation-box">
                                        <strong>Explanation:</strong> ${formatQuestionText(answer.explanation)}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
            } else {
                html += '<div class="no-attempts">No question details available for this attempt.</div>';
            }

            modalBody.innerHTML = html;
        }

        function formatTime(ms) {
            if (!ms || ms === 0) return '0s';
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;

            if (minutes > 0) {
                return `${minutes}m ${remainingSeconds}s`;
            }
            return `${seconds}s`;
        }

        function formatQuestionText(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            let escaped = div.innerHTML;
            // Support both ``` and ''' as indicators for code blocks
            const codeBlockRegex = /(?:```|''')(?:[a-z]*\n)?([\s\S]*?)(?:```|''')/g;
            return escaped.replace(codeBlockRegex, (match, code) => `<div class="pseudocode-block">${code.trim()}</div>`);
        }

        async function resetStudentPassword(studentId, studentName) {
            const newPassword = prompt(`Enter new password for ${studentName} (minimum 6 characters):`);
            if (!newPassword) return;
            
            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters long.');
                return;
            }

            if (!confirm(`Are you sure you want to change the password for ${studentName}?`)) {
                return;
            }

            try {
                const response = await fetch(`${apiBase}/classes/${classId}/students/${studentId}/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Password reset successfully!');
                } else {
                    alert(data.error || 'Failed to reset password');
                }
            } catch (error) {
                console.error('Error resetting password:', error);
                alert('An error occurred while resetting the password.');
            }
        }

        // Note: Initial load is handled by AuthHelper.checkAuth callback above
    </script>
</body>
</html>
