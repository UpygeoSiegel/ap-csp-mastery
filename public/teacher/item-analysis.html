<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Mastery · AP CSP Mastery</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Navbar styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            width: 100%;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-link {
            padding: 0.6rem 1.25rem;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border2);
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover {
            background: var(--border);
            color: var(--text);
            border-color: var(--accent);
        }

        .nav-link.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #user-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .btn-logout {
            padding: 0.5rem 1rem;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
            border-radius: 6px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 107, 107, 0.05);
        }

        /* Breadcrumb styles */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        .breadcrumb a {
            color: var(--muted);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: var(--accent);
        }

        .breadcrumb-separator {
            color: var(--border2);
        }

        .breadcrumb-current {
            color: var(--text);
        }

        .page-header {
            margin-bottom: 3rem;
        }
        .page-header h2 {
            margin: 0 0 0.75rem 0;
            font-size: 2.5rem;
            line-height: 1;
        }
        .page-header p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 600px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            padding: 2rem;
            text-align: center;
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }
        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            font-family: 'Barlow Condensed', sans-serif;
            line-height: 1;
        }
        .stat-value.success {
            color: var(--success);
        }
        .stat-value.warning {
            color: var(--warning);
        }
        .stat-value.danger {
            color: var(--danger);
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
        }
        .topics-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .topic-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.2s;
        }
        .topic-header {
            padding: 1.5rem 2rem;
            background: var(--surface2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .topic-header:hover {
            background: var(--border);
        }
        .topic-header h3 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text);
        }
        .topic-meta {
            display: flex;
            gap: 2rem;
            font-size: 0.75rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .topic-meta span {
            color: var(--muted);
        }
        .topic-meta .percentage {
            color: var(--text);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            background: var(--bg);
        }
        .topic-meta .percentage.high {
            color: var(--success);
            background: rgba(78, 201, 123, 0.1);
        }
        .topic-meta .percentage.medium {
            color: var(--warning);
            background: rgba(255, 204, 51, 0.1);
        }
        .topic-meta .percentage.low {
            color: var(--danger);
            background: rgba(255, 107, 107, 0.1);
        }
        .topic-body {
            display: none;
            padding: 2rem;
            border-top: 1px solid var(--border2);
        }
        .topic-body.open {
            display: block;
        }
        .question-item {
            border: 1px solid var(--border2);
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
            background: var(--surface2);
        }
        .question-item:last-child {
            margin-bottom: 0;
        }
        .question-header {
            padding: 1.5rem;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
            border-bottom: 1px solid var(--border2);
        }
        .question-text {
            flex: 1;
            font-weight: 600;
            color: var(--text);
            line-height: 1.5;
        }
        .question-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.7rem;
            flex-shrink: 0;
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }
        .question-stats .stat {
            text-align: center;
        }
        .question-stats .stat-num {
            font-size: 1.25rem;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        .question-stats .stat-num.high {
            color: var(--success);
        }
        .question-stats .stat-num.medium {
            color: var(--warning);
        }
        .question-stats .stat-num.low {
            color: var(--danger);
        }
        .question-stats .stat-lbl {
            color: var(--muted);
        }
        .options-breakdown {
            padding: 1.5rem;
        }
        .options-breakdown h4 {
            margin: 0 0 1.25rem 0;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
        }
        .option-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }
        .option-text {
            flex: 1;
            font-size: 0.9rem;
            min-width: 0;
            color: var(--text);
        }
        .option-text.correct {
            color: var(--success);
            font-weight: 700;
        }
        .option-bar-container {
            width: 200px;
            height: 12px;
            background: var(--bg);
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border2);
        }
        .option-bar-fill {
            height: 100%;
            background: var(--border2);
            transition: width 0.3s cubic-bezier(0.34, 1.5, 0.64, 1);
        }
        .option-bar-fill.correct {
            background: var(--success);
        }
        .option-bar-fill.incorrect-popular {
            background: var(--danger);
        }
        .option-percentage {
            width: 50px;
            text-align: right;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            flex-shrink: 0;
            color: var(--text);
        }
        .no-data {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
            font-style: italic;
        }
        .pseudocode-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            color: var(--text);
        }
        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        .expand-icon {
            transition: transform 0.2s;
            color: var(--muted);
        }
        .expand-icon.open {
            transform: rotate(180deg);
            color: var(--accent);
        }
        .deactivated {
            opacity: 0.5;
            filter: grayscale(1);
        }
        .deactivated-badge {
            background: var(--bg);
            color: var(--muted);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid var(--border);
        }
        .top-missed-section {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .top-missed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .top-missed-header h4 {
            margin: 0;
            font-family: 'Barlow Condensed', sans-serif;
            color: var(--danger);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .top-missed-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .top-missed-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--surface);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .top-missed-rank {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            color: var(--danger);
            min-width: 20px;
        }
        .top-missed-text {
            flex: 1;
            font-weight: 500;
        }
        .top-missed-pct {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .unit-header {
            background: var(--surface2);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin: 2rem 0 1rem 0;
            border-left: 4px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .unit-header h3 {
            margin: 0;
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="navbar">
                <div class="logo">
                    <h1>AP Mastery</h1>
                    <span>Teacher Portal</span>
                </div>
                <div class="nav-links">
                    <a href="/teacher/dashboard.html" class="nav-link">Dashboard</a>
                    <a href="/teacher/item-analysis.html" class="nav-link active">Item Analysis</a>
                    <a href="/teacher/question-management.html" class="nav-link">Questions</a>
                </div>
                <div class="user-section">
                    <button class="btn-logout" style="border-color: var(--accent); color: var(--accent);" onclick="startOnboarding()">Show Tutorial</button>
                    <span id="user-name">Loading...</span>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="page-header">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1.5rem;">
                    <div>
                        <h2>Item Analysis</h2>
                        <p>Review the top 10 most missed questions across all students to identify areas for improvement.</p>
                    </div>
                    <input type="hidden" id="subjectSelect" value="ap-csp">
                </div>
            </div>

            <div id="summary-stats" class="stats-grid">
                <!-- Summary stats will be loaded here -->
            </div>

            <h3 style="margin-bottom: 1rem;">Topics</h3>

            <div id="topics-container" class="topics-container">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading statistics...</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 AP Mastery. Built for AP Computer Science Principles educators.</p>
        </footer>
    </div>

    <!-- Firebase Client SDK for persistent auth -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/auth-helper.js"></script>

    <script>
        const apiBase = window.location.origin + '/api';
        let token = localStorage.getItem('authToken');
        let userData = JSON.parse(localStorage.getItem('userData') || '{}');

        // State
        let topicsData = null;
        let loadedTopicStats = {};

        function startOnboarding() {
            window.location.href = '/teacher/dashboard.html?showTutorial=true';
        }

        // Check auth and get fresh token
        AuthHelper.checkAuth({ allowedRoles: ['teacher'] }).then(({ token: freshToken, userData: freshUserData }) => {
            token = freshToken;
            if (freshUserData) userData = freshUserData;
            document.getElementById('user-name').textContent = userData.displayName || userData.email || 'Teacher';
            loadSummary();
        }).catch(() => {
            // AuthHelper will redirect to login
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            AuthHelper.signOut();
        });

        async function loadSummary() {
            try {
                const subject = document.getElementById('subjectSelect').value;
                const response = await fetch(`${apiBase}/topics/stats/summary?subject=${subject}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load summary');
                }

                topicsData = await response.json();
                renderSummary();
                renderTopics();

            } catch (error) {
                console.error('Error loading summary:', error);
                document.getElementById('topics-container').innerHTML = `
                    <div class="no-data">
                        <p>Error loading statistics. Please try again.</p>
                    </div>
                `;
            }
        }

        function renderSummary() {
            const { bigIdeas } = topicsData;

            // Calculate overall stats
            let totalAttempts = 0;
            let totalCorrect = 0;
            let totalTopics = 0;
            let topicsWithData = 0;

            bigIdeas.forEach(bi => {
                bi.topics.forEach(topic => {
                    totalTopics++;
                    if (topic.stats.totalQuestionAttempts > 0) {
                        totalAttempts += topic.stats.totalQuestionAttempts;
                        totalCorrect += Math.round(topic.stats.totalQuestionAttempts * (topic.stats.overallCorrectPercentage || 0) / 100);
                        topicsWithData++;
                    }
                });
            });

            const overallCorrectPct = totalAttempts > 0
                ? Math.round((totalCorrect / totalAttempts) * 100)
                : null;

            const pctClass = overallCorrectPct === null ? '' :
                (overallCorrectPct >= 70 ? 'success' : (overallCorrectPct >= 50 ? 'warning' : 'danger'));

            document.getElementById('summary-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalTopics}</div>
                    <div class="stat-label">Total Topics</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalAttempts.toLocaleString()}</div>
                    <div class="stat-label">Total Question Attempts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${pctClass}">${overallCorrectPct !== null ? overallCorrectPct + '%' : 'N/A'}</div>
                    <div class="stat-label">Overall Correct Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${topicsWithData}</div>
                    <div class="stat-label">Topics with Data</div>
                </div>
            `;
        }

        function renderTopics() {
            const { bigIdeas } = topicsData;
            const container = document.getElementById('topics-container');

            if (bigIdeas.length === 0) {
                container.innerHTML = '<div class="no-data">No data found.</div>';
                return;
            }

            container.innerHTML = bigIdeas.map(bi => {
                const topicsHtml = bi.topics.map(topic => {
                    const pct = topic.stats.overallCorrectPercentage;
                    const pctClass = pct === null ? '' : (pct >= 70 ? 'high' : (pct >= 50 ? 'medium' : 'low'));
                    const avgTime = topic.stats.avgTimePerQuestionMs
                        ? formatTime(topic.stats.avgTimePerQuestionMs)
                        : 'N/A';

                    return `
                        <div class="topic-card" style="margin-bottom: 1rem;">
                            <div class="topic-header" onclick="toggleTopic('${topic.id}')">
                                <h3>${topic.name}</h3>
                                <div class="topic-meta">
                                    <span>${topic.stats.totalQuestionAttempts} attempts</span>
                                    <span class="percentage ${pctClass}">${pct !== null ? pct + '% correct' : 'No data'}</span>
                                    <span>Avg: ${avgTime}</span>
                                    <svg class="expand-icon" id="icon-${topic.id}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M6 9l6 6 6-6"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="topic-body" id="body-${topic.id}">
                                <div id="top-missed-${topic.id}">
                                    ${renderTopMissed(topic.stats.topMissedQuestions, `Top 10 Most Missed in ${topic.name}`)}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="unit-section">
                        <div class="unit-header" style="border-left-color: ${bi.color || 'var(--accent)'}">
                            <h3>${bi.name}</h3>
                            <div style="font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase;">
                                ${bi.topics.length} Topics
                            </div>
                        </div>
                        
                        ${renderTopMissed(bi.topMissedQuestions, `Top 10 Most Missed Questions in ${bi.shortName || bi.name}`)}
                        
                        <div class="topics-list">
                            ${topicsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTopMissed(questions, title) {
            if (!questions || questions.length === 0) {
                return `
                    <div class="top-missed-section">
                        <div class="top-missed-header">
                            <h4>${title}</h4>
                        </div>
                        <p style="color: var(--muted); font-size: 0.9rem; margin: 0;">No question data available for this section yet.</p>
                    </div>
                `;
            }

            return `
                <div class="top-missed-section">
                    <div class="top-missed-header">
                        <h4>${title}</h4>
                    </div>
                    <div class="top-missed-list">
                        ${questions.map((q, i) => `
                            <div class="top-missed-item" style="flex-direction: column; align-items: stretch; gap: 1rem;">
                                <div style="display: flex; align-items: center; gap: 1rem;">
                                    <span class="top-missed-rank">#${i + 1}</span>
                                    <div style="flex: 1;">
                                        <div class="top-missed-text">${formatQuestionText(q.text)}</div>
                                    </div>
                                    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                                        <span class="top-missed-pct">${q.correctPercentage}% Correct</span>
                                        <span style="font-size: 0.7rem; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase;">${q.totalAttempts} attempts</span>
                                    </div>
                                </div>
                                
                                <div class="options-breakdown" style="padding: 0; margin-top: 0.5rem; border-top: 1px solid var(--border2); padding-top: 1rem;">
                                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                        ${q.optionStats.map(opt => {
                                            const isPopularWrong = !opt.isCorrect && opt.selectionPercentage > 25;
                                            const barClass = opt.isCorrect ? 'correct' : (isPopularWrong ? 'incorrect-popular' : '');
                                            
                                            return `
                                                <div class="option-bar" style="margin-bottom: 0.25rem;">
                                                    <span class="option-text ${opt.isCorrect ? 'correct' : ''}" style="font-size: 0.8rem;">
                                                        <span style="font-weight: 800; font-family: 'Barlow Condensed', sans-serif; margin-right: 0.5rem;">${opt.id}.</span>
                                                        ${opt.text}
                                                    </span>
                                                    <div class="option-bar-container" style="width: 120px; height: 8px;">
                                                        <div class="option-bar-fill ${barClass}" style="width: ${opt.selectionPercentage}%"></div>
                                                    </div>
                                                    <span class="option-percentage" style="width: 35px; font-size: 0.8rem;">${opt.selectionPercentage}%</span>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function toggleTopic(topicId) {
            const body = document.getElementById(`body-${topicId}`);
            const icon = document.getElementById(`icon-${topicId}`);

            if (body.classList.contains('open')) {
                body.classList.remove('open');
                icon.classList.remove('open');
            } else {
                body.classList.add('open');
                icon.classList.add('open');
            }
        }

        function formatTime(ms) {
            if (!ms || ms === 0) return '0s';
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;

            if (minutes > 0) {
                return `${minutes}m ${remainingSeconds}s`;
            }
            return `${seconds}s`;
        }

        function formatQuestionText(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            let escaped = div.innerHTML;
            // Support both ``` and ''' as indicators for code blocks
            const codeBlockRegex = /(?:```|''')(?:[a-z]*\n)?([\s\S]*?)(?:```|''')/g;
            return escaped.replace(codeBlockRegex, (match, code) => `<div class="pseudocode-block">${code.trim()}</div>`);
        }

        // Note: Initial load is handled by AuthHelper.checkAuth callback above
    </script>
</body>
</html>
