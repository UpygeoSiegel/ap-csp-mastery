<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Mastery</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
    <style>
        /* Navbar styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            width: 100%;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-link {
            padding: 0.6rem 1.25rem;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border2);
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover {
            background: var(--border);
            color: var(--text);
            border-color: var(--accent);
        }

        .nav-link.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #user-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .btn-logout {
            padding: 0.5rem 1rem;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border2);
            border-radius: 6px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 107, 107, 0.05);
        }

        /* Breadcrumb styles */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        .breadcrumb a {
            color: var(--muted);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: var(--accent);
        }

        .breadcrumb-separator {
            color: var(--border2);
        }

        .breadcrumb-current {
            color: var(--text);
        }

        .page-header {
            margin-bottom: 3rem;
        }
        .page-header h2 {
            margin: 0 0 0.75rem 0;
            font-size: 2.5rem;
            line-height: 1;
        }
        .page-header p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 600px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            padding: 2rem;
            text-align: center;
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }
        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            font-family: 'Barlow Condensed', sans-serif;
            line-height: 1;
        }
        .stat-value.success {
            color: var(--success);
        }
        .stat-value.warning {
            color: var(--warning);
        }
        .stat-value.danger {
            color: var(--danger);
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
        }
        .topics-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .topic-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.2s;
        }
        .topic-header {
            padding: 1.5rem 2rem;
            background: var(--surface2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .topic-header:hover {
            background: var(--border);
        }
        .topic-header h3 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text);
        }
        .topic-meta {
            display: flex;
            gap: 2rem;
            font-size: 0.75rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .topic-meta span {
            color: var(--muted);
        }
        .topic-meta .percentage {
            color: var(--text);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            background: var(--bg);
        }
        .topic-meta .percentage.high {
            color: var(--success);
            background: rgba(78, 201, 123, 0.1);
        }
        .topic-meta .percentage.medium {
            color: var(--warning);
            background: rgba(255, 204, 51, 0.1);
        }
        .topic-meta .percentage.low {
            color: var(--danger);
            background: rgba(255, 107, 107, 0.1);
        }
        .topic-body {
            display: none;
            padding: 2rem;
            border-top: 1px solid var(--border2);
        }
        .topic-body.open {
            display: block;
        }
        .question-item {
            border: 1px solid var(--border2);
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
            background: var(--surface2);
        }
        .question-item:last-child {
            margin-bottom: 0;
        }
        .question-header {
            padding: 1.5rem;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
            border-bottom: 1px solid var(--border2);
        }
        .question-text {
            flex: 1;
            font-weight: 600;
            color: var(--text);
            line-height: 1.5;
        }
        .question-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.7rem;
            flex-shrink: 0;
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }
        .question-stats .stat {
            text-align: center;
        }
        .question-stats .stat-num {
            font-size: 1.25rem;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        .question-stats .stat-num.high {
            color: var(--success);
        }
        .question-stats .stat-num.medium {
            color: var(--warning);
        }
        .question-stats .stat-num.low {
            color: var(--danger);
        }
        .question-stats .stat-lbl {
            color: var(--muted);
        }
        .options-breakdown {
            padding: 1.5rem;
        }
        .options-breakdown h4 {
            margin: 0 0 1.25rem 0;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
        }
        .option-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }
        .option-text {
            flex: 1;
            font-size: 0.9rem;
            min-width: 0;
            color: var(--text);
        }
        .option-text.correct {
            color: var(--success);
            font-weight: 700;
        }
        .option-bar-container {
            width: 200px;
            height: 12px;
            background: var(--bg);
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border2);
        }
        .option-bar-fill {
            height: 100%;
            background: var(--border2);
            transition: width 0.3s cubic-bezier(0.34, 1.5, 0.64, 1);
        }
        .option-bar-fill.correct {
            background: var(--success);
        }
        .option-bar-fill.incorrect-popular {
            background: var(--danger);
        }
        .option-percentage {
            width: 50px;
            text-align: right;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            flex-shrink: 0;
            color: var(--text);
        }
        .no-data {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
            font-style: italic;
        }
        .pseudocode-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            color: var(--text);
        }

        .math-block {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
            overflow-x: auto;
            color: var(--text);
            font-size: 1.15rem;
            display: flex;
            justify-content: center;
        }
        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        .expand-icon {
            transition: transform 0.2s;
            color: var(--muted);
        }
        .expand-icon.open {
            transform: rotate(180deg);
            color: var(--accent);
        }
        .deactivated {
            opacity: 0.5;
            filter: grayscale(1);
        }
        .deactivated-badge {
            background: var(--bg);
            color: var(--muted);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="navbar">
                <div class="logo">
                    <h1>AP Mastery</h1>
                    <span>Teacher Portal</span>
                </div>
                <div class="nav-links">
                    <a href="/teacher/dashboard.html" class="nav-link">Dashboard</a>
                    <a href="/teacher/item-analysis.html" class="nav-link active">Item Analysis</a>
                    <a href="/teacher/question-management.html" class="nav-link">Questions</a>
                </div>
                <div class="user-section">
                    <span id="user-name">Loading...</span>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="page-header">
                <h2>Item Analysis</h2>
                <p>Review question performance across all students to identify areas for improvement.</p>
                
                <div class="subject-selector" style="margin-top: 1.5rem; display: flex; align-items: center; gap: 1rem;">
                    <label for="subjectSelect" style="font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; color: var(--muted); font-size: 0.9rem;">Subject:</label>
                    <select id="subjectSelect" onchange="loadSummary()" style="padding: 0.6rem 1rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); min-width: 200px; cursor: pointer;">
                        <option value="ap-csp">AP CSP</option>
                        <option value="ap-calculus-ab">AP Calculus AB</option>
                    </select>
                </div>
            </div>

            <div id="summary-stats" class="stats-grid">
                <!-- Summary stats will be loaded here -->
            </div>

            <h3 style="margin-bottom: 1rem;">Topics</h3>

            <div id="topics-container" class="topics-container">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading statistics...</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 AP Mastery. Built for AP Computer Science Principles educators.</p>
        </footer>
    </div>

    <!-- Firebase Client SDK for persistent auth -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/auth-helper.js"></script>

    <script>
        const apiBase = window.location.origin + '/api';
        let token = localStorage.getItem('authToken');
        let userData = JSON.parse(localStorage.getItem('userData') || '{}');

        // State
        let topicsData = null;
        let loadedTopicStats = {};

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatQuestionText(text) {
            if (!text) return '';
            
            // 1. Escape HTML first
            let formatted = escapeHtml(text);
            
            // 2. Handle LaTeX block math: $$ formula $$
            const blockMathRegex = /\$\$([\s\S]*?)\$\$/g;
            text.replace(blockMathRegex, (match, formula) => {
                try {
                    const html = typeof katex !== 'undefined' 
                        ? `<div class="math-block">${katex.renderToString(formula.trim(), { displayMode: true, throwOnError: false })}</div>`
                        : `<div class="math-block">${match}</div>`;
                    const placeholder = escapeHtml(match);
                    formatted = formatted.split(placeholder).join(html);
                } catch (e) { console.error(e); }
            });
            
            // 3. Handle LaTeX inline math: $ formula $
            const inlineMathRegex = /\$([^$]+?)\$/g;
            text.replace(inlineMathRegex, (match, formula) => {
                try {
                    const html = typeof katex !== 'undefined'
                        ? katex.renderToString(formula.trim(), { displayMode: false, throwOnError: false })
                        : match;
                    const placeholder = escapeHtml(match);
                    formatted = formatted.split(placeholder).join(html);
                } catch (e) { console.error(e); }
            });

            // 4. Handle code blocks: ``` code ```
            const codeBlockRegex = /(?:```|''')(?:[a-z]*\n)?([\s\S]*?)(?:```|''')/g;
            text.replace(codeBlockRegex, (match, code) => {
                const html = `<div class="pseudocode-block">${escapeHtml(code.trim())}</div>`;
                const placeholder = escapeHtml(match);
                formatted = formatted.split(placeholder).join(html);
            });
            
            return formatted;
        }

        // Check auth and get fresh token
        AuthHelper.checkAuth({ allowedRoles: ['teacher'] }).then(({ token: freshToken, userData: freshUserData }) => {
            token = freshToken;
            if (freshUserData) userData = freshUserData;
            document.getElementById('user-name').textContent = userData.displayName || userData.email || 'Teacher';
            loadSummary();
        }).catch(() => {
            // AuthHelper will redirect to login
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            AuthHelper.signOut();
        });

        async function loadSummary() {
            try {
                const subject = document.getElementById('subjectSelect').value;
                const response = await fetch(`${apiBase}/topics/stats/summary?subject=${subject}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load summary');
                }

                topicsData = await response.json();
                renderSummary();
                renderTopics();

            } catch (error) {
                console.error('Error loading summary:', error);
                document.getElementById('topics-container').innerHTML = `
                    <div class="no-data">
                        <p>Error loading statistics. Please try again.</p>
                    </div>
                `;
            }
        }

        function renderSummary() {
            const { topics } = topicsData;

            // Calculate overall stats
            let totalAttempts = 0;
            let totalCorrect = 0;
            let topicsWithData = 0;

            topics.forEach(topic => {
                if (topic.stats.totalQuestionAttempts > 0) {
                    totalAttempts += topic.stats.totalQuestionAttempts;
                    totalCorrect += Math.round(topic.stats.totalQuestionAttempts * (topic.stats.overallCorrectPercentage || 0) / 100);
                    topicsWithData++;
                }
            });

            const overallCorrectPct = totalAttempts > 0
                ? Math.round((totalCorrect / totalAttempts) * 100)
                : null;

            const pctClass = overallCorrectPct === null ? '' :
                (overallCorrectPct >= 70 ? 'success' : (overallCorrectPct >= 50 ? 'warning' : 'danger'));

            document.getElementById('summary-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${topics.length}</div>
                    <div class="stat-label">Total Topics</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalAttempts.toLocaleString()}</div>
                    <div class="stat-label">Total Question Attempts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${pctClass}">${overallCorrectPct !== null ? overallCorrectPct + '%' : 'N/A'}</div>
                    <div class="stat-label">Overall Correct Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${topicsWithData}</div>
                    <div class="stat-label">Topics with Data</div>
                </div>
            `;
        }

        function renderTopics() {
            const { topics } = topicsData;
            const container = document.getElementById('topics-container');

            if (topics.length === 0) {
                container.innerHTML = '<div class="no-data">No topics found.</div>';
                return;
            }

            container.innerHTML = topics.map(topic => {
                const pct = topic.stats.overallCorrectPercentage;
                const pctClass = pct === null ? '' : (pct >= 70 ? 'high' : (pct >= 50 ? 'medium' : 'low'));
                const avgTime = topic.stats.avgTimePerQuestionMs
                    ? formatTime(topic.stats.avgTimePerQuestionMs)
                    : 'N/A';

                return `
                    <div class="topic-card">
                        <div class="topic-header" onclick="toggleTopic('${topic.id}')">
                            <h3>${topic.name}</h3>
                            <div class="topic-meta">
                                <span>${topic.questionCount} questions</span>
                                <span>${topic.stats.totalQuestionAttempts} attempts</span>
                                <span class="percentage ${pctClass}">${pct !== null ? pct + '% correct' : 'No data'}</span>
                                <span>Avg: ${avgTime}</span>
                                <svg class="expand-icon" id="icon-${topic.id}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M6 9l6 6 6-6"/>
                                </svg>
                            </div>
                        </div>
                        <div class="topic-body" id="body-${topic.id}">
                            <div class="loading-state">Loading questions...</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleTopic(topicId) {
            const body = document.getElementById(`body-${topicId}`);
            const icon = document.getElementById(`icon-${topicId}`);

            if (body.classList.contains('open')) {
                body.classList.remove('open');
                icon.classList.remove('open');
            } else {
                body.classList.add('open');
                icon.classList.add('open');

                // Load question stats if not already loaded
                if (!loadedTopicStats[topicId]) {
                    await loadTopicQuestionStats(topicId);
                }
            }
        }

        async function loadTopicQuestionStats(topicId) {
            try {
                const response = await fetch(`${apiBase}/topics/${topicId}/question-stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to load question stats');
                }

                const data = await response.json();
                loadedTopicStats[topicId] = data;
                renderTopicQuestions(topicId, data);

            } catch (error) {
                console.error('Error loading question stats:', error);
                document.getElementById(`body-${topicId}`).innerHTML = `
                    <div class="no-data">Error loading question statistics.</div>
                `;
            }
        }

        function renderTopicQuestions(topicId, data) {
            const body = document.getElementById(`body-${topicId}`);
            const { questions } = data;

            if (!questions || questions.length === 0) {
                body.innerHTML = '<div class="no-data">No questions in this topic.</div>';
                return;
            }

            body.innerHTML = questions.map((q, i) => {
                const stats = q.stats;
                const correctPct = stats.correctPercentage;
                const pctClass = correctPct === null ? '' : (correctPct >= 70 ? 'high' : (correctPct >= 50 ? 'medium' : 'low'));
                const avgTime = stats.avgTimeMs ? formatTime(stats.avgTimeMs) : 'N/A';

                return `
                    <div class="question-item ${q.deactivated ? 'deactivated' : ''}">
                        <div class="question-header">
                            <div class="question-text">
                                ${i + 1}. ${formatQuestionText(q.text)}
                                ${q.deactivated ? '<span class="deactivated-badge">Deactivated</span>' : ''}
                            </div>
                            <div class="question-stats">
                                <div class="stat">
                                    <div class="stat-num">${stats.totalAttempts}</div>
                                    <div class="stat-lbl">Attempts</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-num ${pctClass}">${correctPct !== null ? correctPct + '%' : 'N/A'}</div>
                                    <div class="stat-lbl">Correct</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-num">${avgTime}</div>
                                    <div class="stat-lbl">Avg Time</div>
                                </div>
                            </div>
                        </div>
                        <div class="options-breakdown">
                            <h4>Answer Distribution</h4>
                            ${stats.optionStats.map(opt => {
                                const isPopularWrong = !opt.isCorrect && opt.selectionPercentage > 30;
                                const barClass = opt.isCorrect ? 'correct' : (isPopularWrong ? 'incorrect-popular' : '');

                                return `
                                    <div class="option-bar">
                                        <span class="option-text ${opt.isCorrect ? 'correct' : ''}">${formatQuestionText(opt.text)}</span>
                                        <div class="option-bar-container">
                                            <div class="option-bar-fill ${barClass}" style="width: ${opt.selectionPercentage}%"></div>
                                        </div>
                                        <span class="option-percentage">${opt.selectionPercentage}%</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatTime(ms) {
            if (!ms || ms === 0) return '0s';
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;

            if (minutes > 0) {
                return `${minutes}m ${remainingSeconds}s`;
            }
            return `${seconds}s`;
        }

        // Note: Initial load is handled by AuthHelper.checkAuth callback above
    </script>
